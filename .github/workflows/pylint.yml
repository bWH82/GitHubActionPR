name: Pylint

on: 
  - workflow_dispatch

jobs:
  lintingOperation:  #this is the name of a job
    runs-on: ubuntu-latest  # this is the snowglobe to use for work
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "main.py"  # Directory to check
